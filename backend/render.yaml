{
  "name": "pku-cycle-backend",
  "version": "1.0.0",
  "build": {
    "command": "pip install -r requirements.txt",
    "builder": "python"
  },
  "run": {
    "command": "uvicorn app.main:app --host 0.0.0.0 --port $PORT",
    "env": {
      "DATABASE_URL": "postgresql://user:password@host:5432/dbname"
    }
  }
}
